<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Doodle Jump</title>
  <base href="https://cdn.jsdelivr.net/gh/bubbls/UGS-Assets@main/doodle%20jump/">
  <link rel="stylesheet" href="style.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #87ceeb; }
    #canvas { display: block; margin: 0 auto; max-height: 100vh; }
  </style>
  <script>
    // Block AdSense and Cloudflare before anything loads
    window.adsbygoogle = { loaded: true, push: function() {} };
    var _origCreateElement = document.createElement.bind(document);
    document.createElement = function(tag) {
      var el = _origCreateElement(tag);
      if (tag.toLowerCase() === 'script') {
        var desc = Object.getOwnPropertyDescriptor(HTMLScriptElement.prototype, 'src');
        Object.defineProperty(el, 'src', {
          set: function(val) {
            if (/googlesyndication|cloudflare|pagead/.test(String(val))) return;
            if (desc && desc.set) desc.set.call(el, val);
          },
          get: function() { return desc && desc.get ? desc.get.call(el) : ''; },
          configurable: true
        });
      }
      return el;
    };
  </script>
</head>
<body>
  <canvas id="canvas"></canvas>
  <script type="text/javascript" src="main.js"></script>
</body>
</html>
