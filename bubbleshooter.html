<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Bubble Shooter</title>
<style>
  html, body {
    margin: 0; padding: 0; width: 100%; height: 100%;
    background: #000; overflow: hidden;
    display: flex; align-items: center; justify-content: center;
  }
  ruffle-player { width: 100%; height: 100%; }
</style>
</head>
<body>
  <script src="https://cdn.jsdelivr.net/npm/@ruffle-rs/ruffle@0.2.0-nightly.2025.10.2/ruffle.min.js"></script>
  <script>
    window.RufflePlayer = window.RufflePlayer || {};
    window.RufflePlayer.config = {
      autoplay: "on",
      unmuteOverlay: "hidden",
      backgroundColor: "#000000"
    };
  </script>
  <ruffle-player
    src="https://cdn.jsdelivr.net/gh/oldflashgames/games1@627d7cb5f49465a18a8320b9339dbc3cf577b5d8/bubble-shooter.swf"
    width="100%"
    height="100%">
  </ruffle-player>

</html>
