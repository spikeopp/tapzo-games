<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
  <title>Bubble Shooter</title>
  <style>
    html, body { height: 100%; margin: 0; }
    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    #game {
      display: block;
      border: 2px solid #e94560;
      border-radius: 8px;
      touch-action: none;
    }
    #controls {
      display: flex;
      gap: 16px;
      margin-top: 12px;
    }
    .btn {
      padding: 12px 28px;
      background: rgba(233,69,96,0.3);
      border: 2px solid #e94560;
      border-radius: 10px;
      color: #fff;
      font-size: 22px;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:active { background: rgba(233,69,96,0.7); }
    #shoot-btn {
      padding: 12px 36px;
      background: #e94560;
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    #shoot-btn:active { opacity: 0.7; }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <div id="controls">
    <button class="btn" id="leftBtn">◀</button>
    <button id="shoot-btn">🔵 SHOOT</button>
    <button class="btn" id="rightBtn">▶</button>
  </div>

<script>
const canvas = document.getElementById('game');
const context = canvas.getContext('2d');

// Responsive sizing
const maxW = Math.min(window.innerWidth - 8, 320);
const maxH = Math.min(window.innerHeight - 120, 480);
const scale = Math.min(maxW / 271, maxH / 392);
canvas.width = Math.floor(271 * scale);
canvas.height = Math.floor(392 * scale);
const S = scale;

const grid = Math.floor(32 * S);
const level1 = [
  ['R','R','Y','Y','B','B','G','G'],
  ['R','R','Y','Y','B','B','G'],
  ['B','B','G','G','R','R','Y','Y'],
  ['B','G','G','R','R','Y','Y']
];
const colorMap = { 'R':'red','G':'green','B':'blue','Y':'yellow' };
const colors = Object.values(colorMap);
const bubbleGap = 1;
const wallSize = Math.floor(4 * S);
const bubbles = [];
let particles = [];

function degToRad(deg) { return (deg * Math.PI) / 180; }
function rotatePoint(x, y, angle) {
  return { x: x * Math.cos(angle) - y * Math.sin(angle), y: x * Math.sin(angle) + y * Math.cos(angle) };
}
function getRandomInt(min, max) { return Math.floor(Math.random() * (Math.floor(max) - Math.ceil(min) + 1)) + Math.ceil(min); }
function getDistance(o1, o2) { return Math.sqrt((o1.x-o2.x)**2 + (o1.y-o2.y)**2); }
function collides(o1, o2) { return getDistance(o1, o2) < o1.radius + o2.radius; }

function getClosestBubble(obj, activeState = false) {
  const closest = bubbles.filter(b => b.active == activeState && collides(obj, b));
  if (!closest.length) return;
  return closest.map(b => ({ distance: getDistance(obj, b), bubble: b })).sort((a,b) => a.distance - b.distance)[0].bubble;
}

function createBubble(x, y, color) {
  const row = Math.floor(y / grid), col = Math.floor(x / grid);
  const startX = row % 2 === 0 ? 0 : 0.5 * grid;
  const center = grid / 2;
  bubbles.push({
    x: wallSize + (grid + bubbleGap) * col + startX + center,
    y: wallSize + (grid + bubbleGap - 4*S) * row + center,
    radius: grid / 2, color, active: color ? true : false
  });
}

function getNeighbors(bubble) {
  const neighbors = [];
  const dirs = [0, 60, 120, 180, 240, 300].map(d => rotatePoint(grid, 0, degToRad(d)));
  for (const dir of dirs) {
    const n = getClosestBubble({ x: bubble.x+dir.x, y: bubble.y+dir.y, radius: bubble.radius }, true);
    if (n && n !== bubble && !neighbors.includes(n)) neighbors.push(n);
  }
  return neighbors;
}

function removeMatch(target) {
  const matches = [target];
  bubbles.forEach(b => b.processed = false);
  target.processed = true;
  let neighbors = getNeighbors(target);
  for (let i = 0; i < neighbors.length; i++) {
    const n = neighbors[i];
    if (!n.processed) {
      n.processed = true;
      if (n.color === target.color) { matches.push(n); neighbors = neighbors.concat(getNeighbors(n)); }
    }
  }
  if (matches.length >= 3) matches.forEach(b => b.active = false);
}

function dropFloatingBubbles() {
  const active = bubbles.filter(b => b.active);
  active.forEach(b => b.processed = false);
  let neighbors = active.filter(b => b.y - grid <= wallSize);
  for (let i = 0; i < neighbors.length; i++) {
    const n = neighbors[i];
    if (!n.processed) { n.processed = true; neighbors = neighbors.concat(getNeighbors(n)); }
  }
  active.filter(b => !b.processed).forEach(b => {
    b.active = false;
    particles.push({ x: b.x, y: b.y, color: b.color, radius: b.radius, active: true });
  });
}

for (let row = 0; row < 10; row++)
  for (let col = 0; col < (row % 2 === 0 ? 8 : 7); col++)
    createBubble(col * grid, row * grid, colorMap[level1[row]?.[col]]);

const curBubblePos = { x: canvas.width/2, y: canvas.height - grid * 1.5 };
const curBubble = { x: curBubblePos.x, y: curBubblePos.y, color: 'red', radius: grid/2, speed: 8*S, dx: 0, dy: 0 };
let shootDeg = 0;
const minDeg = degToRad(-60), maxDeg = degToRad(60);
let shootDir = 0;

function getNewBubble() {
  curBubble.x = curBubblePos.x; curBubble.y = curBubblePos.y; curBubble.dx = curBubble.dy = 0;
  curBubble.color = colors[getRandomInt(0, colors.length - 1)];
}

function shoot() {
  if (curBubble.dx === 0 && curBubble.dy === 0) {
    curBubble.dx = Math.sin(shootDeg) * curBubble.speed;
    curBubble.dy = -Math.cos(shootDeg) * curBubble.speed;
  }
}

function handleCollision(bubble) {
  bubble.color = curBubble.color; bubble.active = true;
  getNewBubble(); removeMatch(bubble); dropFloatingBubbles();
}

function loop() {
  requestAnimationFrame(loop);
  context.clearRect(0, 0, canvas.width, canvas.height);
  shootDeg = Math.max(minDeg, Math.min(maxDeg, shootDeg + degToRad(2) * shootDir));

  curBubble.x += curBubble.dx; curBubble.y += curBubble.dy;
  if (curBubble.x - grid/2 < wallSize) { curBubble.x = wallSize + grid/2; curBubble.dx *= -1; }
  else if (curBubble.x + grid/2 > canvas.width - wallSize) { curBubble.x = canvas.width - wallSize - grid/2; curBubble.dx *= -1; }
  if (curBubble.y - grid/2 < wallSize) { const c = getClosestBubble(curBubble); handleCollision(c); }

  for (const bubble of bubbles) {
    if (bubble.active && collides(curBubble, bubble)) {
      const c = getClosestBubble(curBubble);
      if (!c) { alert('Game Over! Restarting...'); window.location.reload(); return; }
      handleCollision(c); break;
    }
  }

  particles.forEach(p => p.y += 8*S);
  particles = particles.filter(p => p.y < canvas.height - grid/2);

  // Draw walls
  context.fillStyle = 'lightgrey';
  context.fillRect(0, 0, canvas.width, wallSize);
  context.fillRect(0, 0, wallSize, canvas.height);
  context.fillRect(canvas.width - wallSize, 0, wallSize, canvas.height);

  // Draw bubbles
  bubbles.concat(particles).forEach(b => {
    if (!b.active) return;
    context.fillStyle = b.color;
    context.beginPath(); context.arc(b.x, b.y, b.radius, 0, 2*Math.PI); context.fill();
    // Shine effect
    context.fillStyle = 'rgba(255,255,255,0.3)';
    context.beginPath(); context.arc(b.x - b.radius*0.3, b.y - b.radius*0.3, b.radius*0.3, 0, 2*Math.PI); context.fill();
  });

  // Draw arrow
  context.save();
  context.translate(curBubblePos.x, curBubblePos.y);
  context.rotate(shootDeg);
  context.translate(0, -grid/2 * 4.5);
  context.strokeStyle = 'white'; context.lineWidth = 2;
  context.beginPath();
  context.moveTo(0, 0); context.lineTo(0, grid*2);
  context.moveTo(0, 0); context.lineTo(-10*S, grid*0.4);
  context.moveTo(0, 0); context.lineTo(10*S, grid*0.4);
  context.stroke();
  context.restore();

  // Draw current bubble
  context.fillStyle = curBubble.color;
  context.beginPath(); context.arc(curBubble.x, curBubble.y, curBubble.radius, 0, 2*Math.PI); context.fill();
}

// Keyboard
document.addEventListener('keydown', e => {
  if (e.key==='a') shootDir=-1;
  else if (e.key==='d') shootDir=1;
  if (e.code==='Space') shoot();
});
document.addEventListener('keyup', e => {
  if (e.key==='a' && shootDir===-1) shootDir=0;
  else if (e.key==='d' && shootDir===1) shootDir=0;
});

// Touch buttons
const leftBtn = document.getElementById('leftBtn');
const rightBtn = document.getElementById('rightBtn');
document.getElementById('shoot-btn').addEventListener('click', shoot);
leftBtn.addEventListener('touchstart', e => { e.preventDefault(); shootDir=-1; }, {passive:false});
leftBtn.addEventListener('touchend', e => { e.preventDefault(); shootDir=0; }, {passive:false});
rightBtn.addEventListener('touchstart', e => { e.preventDefault(); shootDir=1; }, {passive:false});
rightBtn.addEventListener('touchend', e => { e.preventDefault(); shootDir=0; }, {passive:false});
leftBtn.addEventListener('mousedown', () => shootDir=-1);
leftBtn.addEventListener('mouseup', () => shootDir=0);
rightBtn.addEventListener('mousedown', () => shootDir=1);
rightBtn.addEventListener('mouseup', () => shootDir=0);

requestAnimationFrame(loop);
</script>
</body>
</html>
