<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<base href="https://cdn.jsdelivr.net/gh/cooldude2349/everything@main/blazedrift/">
<title>Blaze Drifter</title>
<style>
  body { margin: 0; background-color: black; overflow: hidden; }
  #canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: block; }
</style>
<script>
  window.PokiSDK = {
    gameLoadingStart: function() {},
    gameLoadingFinished: function() {},
    gameplayStart: function() {},
    gameplayStop: function() {},
    commercialBreak: function() { return Promise.resolve(); },
    rewardedBreak: function(cb) { if(cb) cb({success:true}); return Promise.resolve(); },
    setDebug: function() {},
    shareableURL: function() { return Promise.resolve(window.location.href); },
    init: function() { return Promise.resolve(); }
  };
</script>
</head>
<body>
  <canvas id="canvas" antialiased="false" oncontextmenu="event.preventDefault()"></canvas>
  <script>
    var Module = {
      preRun: [],
      postRun: [],
      canvas: (function() {
        var canvas = document.getElementById('canvas');
        canvas.addEventListener("webglcontextlost", function(e) { e.preventDefault(); }, false);
        return canvas;
      })(),
      setStatus: function(text) {},
      totalDependencies: 0,
      monitorRunDependencies: function(left) {}
    };
    window.onerror = function(event) { console.log("onerror: " + event.message); };
    window.addEventListener('click', function(ev) { if (Module._OnClick) Module._OnClick(ev); }, {passive: false});
  </script>
  <script src="poki-sdk-edit3.js"></script>
  <script async="false" type="text/javascript" src="moonbird.js"></script>
</body>
</html>
