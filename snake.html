<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
  <title>Snake</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a2e; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: Arial, sans-serif; overflow: hidden; }
    #score { color: #e94560; font-size: 20px; font-weight: bold; margin-bottom: 10px; }
    canvas { background: #16213e; border: 2px solid #e94560; border-radius: 8px; touch-action: none; }
    #msg { color: #fff; font-size: 16px; margin-top: 12px; text-align: center; }
    #startBtn { margin-top: 12px; padding: 10px 30px; background: #e94560; color: #fff; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }
    #dpad { display: grid; grid-template-columns: repeat(3, 52px); grid-template-rows: repeat(2, 52px); gap: 4px; margin-top: 14px; }
    .dkey { background: rgba(233,69,96,0.25); border: 2px solid #e94560; border-radius: 8px; color: #fff; font-size: 22px; display: flex; align-items: center; justify-content: center; cursor: pointer; user-select: none; -webkit-tap-highlight-color: transparent; }
    .dkey:active { background: rgba(233,69,96,0.6); }
  </style>
</head>
<body>
  <div id="score">Score: 0</div>
  <canvas id="c"></canvas>
  <div id="msg">Swipe or use D-Pad to play</div>
  <button id="startBtn">Start Game</button>
  <div id="dpad">
    <div></div>
    <div class="dkey" id="up">▲</div>
    <div></div>
    <div class="dkey" id="left">◀</div>
    <div class="dkey" id="down">▼</div>
    <div class="dkey" id="right">▶</div>
  </div>

  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const msgEl = document.getElementById('msg');
    const startBtn = document.getElementById('startBtn');

    const CELL = 20;
    let cols, rows, snake, dir, nextDir, food, score, gameLoop, running = false;

    function resize() {
      const size = Math.min(window.innerWidth - 20, window.innerHeight - 220);
      const s = Math.floor(size / CELL) * CELL;
      canvas.width = s; canvas.height = s;
      cols = s / CELL; rows = s / CELL;
    }

    function init() {
      snake = [{ x: Math.floor(cols/2), y: Math.floor(rows/2) }];
      dir = { x: 1, y: 0 }; nextDir = { x: 1, y: 0 };
      score = 0; scoreEl.textContent = 'Score: 0';
      placeFood(); draw();
    }

    function placeFood() {
      do { food = { x: Math.floor(Math.random()*cols), y: Math.floor(Math.random()*rows) }; }
      while (snake.some(s => s.x===food.x && s.y===food.y));
    }

    function draw() {
      ctx.fillStyle = '#16213e'; ctx.fillRect(0,0,canvas.width,canvas.height);
      // food
      ctx.fillStyle = '#f5a623';
      ctx.beginPath(); ctx.arc((food.x+0.5)*CELL,(food.y+0.5)*CELL,CELL/2-2,0,Math.PI*2); ctx.fill();
      // snake
      snake.forEach((s,i) => {
        ctx.fillStyle = i===0 ? '#e94560' : '#0f3460';
        ctx.beginPath(); ctx.roundRect(s.x*CELL+1,s.y*CELL+1,CELL-2,CELL-2,4); ctx.fill();
      });
    }

    function step() {
      dir = nextDir;
      const head = { x: (snake[0].x+dir.x+cols)%cols, y: (snake[0].y+dir.y+rows)%rows };
      if (snake.some(s => s.x===head.x && s.y===head.y)) { gameOver(); return; }
      snake.unshift(head);
      if (head.x===food.x && head.y===food.y) {
        score += 10; scoreEl.textContent = 'Score: ' + score; placeFood();
      } else { snake.pop(); }
      draw();
    }

    function gameOver() {
      clearInterval(gameLoop); running = false;
      ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.fillRect(0,0,canvas.width,canvas.height);
      ctx.fillStyle = '#e94560'; ctx.font = 'bold 28px Arial'; ctx.textAlign = 'center';
      ctx.fillText('Game Over!', canvas.width/2, canvas.height/2 - 20);
      ctx.fillStyle = '#fff'; ctx.font = '20px Arial';
      ctx.fillText('Score: ' + score, canvas.width/2, canvas.height/2 + 20);
      startBtn.textContent = 'Play Again'; startBtn.style.display = 'block';
      msgEl.textContent = 'Tap Play Again to restart';
    }

    startBtn.addEventListener('click', () => {
      startBtn.style.display = 'none'; msgEl.textContent = 'Swipe or use D-Pad to play';
      clearInterval(gameLoop); running = true; init();
      gameLoop = setInterval(step, 150);
    });

    // Keyboard
    document.addEventListener('keydown', e => {
      if (e.key==='ArrowUp'    && dir.y!==1)  nextDir={x:0,y:-1};
      if (e.key==='ArrowDown'  && dir.y!==-1) nextDir={x:0,y:1};
      if (e.key==='ArrowLeft'  && dir.x!==1)  nextDir={x:-1,y:0};
      if (e.key==='ArrowRight' && dir.x!==-1) nextDir={x:1,y:0};
    });

    // D-pad
    document.getElementById('up').addEventListener('click',    () => { if(dir.y!==1)  nextDir={x:0,y:-1}; });
    document.getElementById('down').addEventListener('click',  () => { if(dir.y!==-1) nextDir={x:0,y:1}; });
    document.getElementById('left').addEventListener('click',  () => { if(dir.x!==1)  nextDir={x:-1,y:0}; });
    document.getElementById('right').addEventListener('click', () => { if(dir.x!==-1) nextDir={x:1,y:0}; });

    // Swipe
    let tx, ty;
    canvas.addEventListener('touchstart', e => { tx=e.touches[0].clientX; ty=e.touches[0].clientY; }, {passive:true});
    canvas.addEventListener('touchend', e => {
      const dx=e.changedTouches[0].clientX-tx, dy=e.changedTouches[0].clientY-ty;
      if (Math.abs(dx)<20 && Math.abs(dy)<20) return;
      if (Math.abs(dx)>Math.abs(dy)) { if(dx>0&&dir.x!==-1) nextDir={x:1,y:0}; else if(dx<0&&dir.x!==1) nextDir={x:-1,y:0}; }
      else { if(dy>0&&dir.y!==-1) nextDir={x:0,y:1}; else if(dy<0&&dir.y!==1) nextDir={x:0,y:-1}; }
    }, {passive:true});

    resize();
    window.addEventListener('resize', () => { resize(); if(!running) init(); });
    init();
  </script>
</body>
</html>
